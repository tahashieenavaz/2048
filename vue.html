<html>
    <div id="app">
        {{name}}
        <input type="text" v-model="name">
    </div>
    <script src="vue.js"></script>
    <script>
        const app = Vue.createApp({
            data() {
                return {
                    name: "Amirreza"
                }
            }
        })
        app.mount("#app")
    </script>
</html>
